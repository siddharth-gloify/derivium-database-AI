<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fetcher.io DataBase AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- ── Left Panel ──────────────────────────────── -->
    <aside class="panel-left">

      <div class="brand">
        <svg class="brand-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <polygon points="12,2 22,7 22,17 12,22 2,17 2,7" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="12,7 17,9.5 17,14.5 12,17 7,14.5 7,9.5" fill="currentColor" opacity="0.35"/>
        </svg>
        <span class="brand-name">Fetcher.io Database AI</span>
      </div>

      <div class="query-section">
        <label class="field-label" for="question">Natural Language</label>
        <textarea
          id="question"
          class="textarea"
          placeholder="Ask anything about the database…&#10;e.g. Show top 10 securities by issue size"
          rows="5"
          spellcheck="false"
        ></textarea>
        <button id="runBtn" class="btn-run">
          <span class="btn-text">Run Query</span>
          <kbd class="btn-kbd">Ctrl ↵</kbd>
        </button>
      </div>

      <!-- SQL block — hidden until first query -->
      <div id="sqlSection" class="sql-section hidden">
        <div class="section-header">
          <span class="field-label">Generated SQL</span>
          <button id="copyBtn" class="icon-btn" title="Copy SQL">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
        <pre id="sqlDisplay" class="sql-block"></pre>
      </div>

      <!-- Timing + validation — hidden until first query -->
      <div id="metaSection" class="meta-section hidden">
        <div id="validationBadge" class="badge"></div>
        <div class="divider"></div>
        <div id="timingsEl" class="timings"></div>
      </div>

    </aside>

    <!-- ── Right Panel ─────────────────────────────── -->
    <main class="panel-right">

      <div id="emptyState" class="centered-state">
        <div class="state-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
            <polygon points="12,2 22,7 22,17 12,22 2,17 2,7" stroke="currentColor" stroke-width="1" stroke-linejoin="round" opacity="0.2"/>
          </svg>
        </div>
        <p class="state-msg">Ask a question to query the database</p>
      </div>

      <div id="loadingState" class="centered-state hidden">
        <div class="spinner"></div>
        <p class="state-msg" id="loadingMsg">Generating SQL&hellip;</p>
      </div>

      <div id="errorState" class="centered-state hidden">
        <div class="state-icon error">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <p class="state-msg error" id="errorMsg"></p>
      </div>

      <div id="resultsState" class="results-state hidden">
        <div class="results-bar">
          <span id="rowCountLabel" class="row-count-label"></span>
        </div>
        <div class="table-scroll">
          <table id="resultsTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
